name: sooq_syria
description: "Sooq Syria - Marketplace app for Syria"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  bloc: ^9.0.0
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.6
  firebase_messaging: ^15.2.5
  firebase_analytics: ^11.4.6
  firebase_crashlytics: ^4.3.6
  firebase_remote_config: ^5.4.6
  firebase_app_check: 0.3.2+10
  firebase_dynamic_links: ^6.1.5

  # State Management
  flutter_bloc: ^9.1.0

  # Routing
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^5.0.0
  flutter_svg: ^2.0.17
  lottie: ^3.3.1

  # Network & Storage
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1

  # Location & Permissions
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Utilities
  shared_preferences: ^2.3.5
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  package_info_plus: ^8.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_native_splash:
  color: "#1A73E8"
  image: assets/images/logo_white.png
  android: true
  ios: true
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/images/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
